<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drawing</title>

<style>

html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

/* ===== BACKGROUND ===== */
.bg{
    position:fixed;
    inset:0;
    background:url("Images/1 visual artist/VA/1 drawing/Drawing.png") center/cover no-repeat;
    filter:blur(20px) brightness(0.7);
    transform:scale(1.1);
    z-index:0;
}

/* ===== MAIN STAGE ===== */
.stage{
    position:relative;
    z-index:1;
    width:100%;
    height:100vh;
    height:100dvh;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== IMAGE WRAPPER ===== */
.foreground{
    position:relative;
    height:100vh;
    height:100dvh;
    width:auto;
}

.foreground img{
    height:100%;
    width:auto;
    display:block;
    pointer-events:none;
}

/* ===== BACK BUTTON (HIDDEN BUT ACTIVE) ===== */
.back-area{
    position:absolute;

    top: 6%;
    left: 18%;
    width: 10%;
    height: 6%;

    z-index:99999;

    /* 🔥 FULLY HIDDEN */
    background: transparent;
    border: none;
    color: transparent;

    opacity: 0;

    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
}

/* iPhone tweak */
@media (max-width: 768px){
    .back-area{
        top: 6.5%;
        left: 17%;
        width: 12%;
        height: 7%;
    }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="stage">

    <div class="foreground">
        <img src="Images/1 visual artist/VA/1 drawing/Drawing.png" alt="Drawing">

        <!-- BACK BUTTON -->
        <div class="back-area" onclick="goBack()"></div>

    </div>

</div>

<script>
function goBack(){
    if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
    } else {
        window.location.href = "VisualArtist.html";
    }
}
</script>

</body>
</html>
