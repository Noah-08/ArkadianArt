<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community Facilitation</title>

<style>

/* =========================
   🎛️ CONTROL PANEL
   ========================= */
:root{
    --show-button: 1; /* 0 = hidden, 1 = visible */

    /* Position (works on ALL devices) */
    --btn-top: 11%;
    --btn-left: 22%;

    /* Size */
    --btn-width: 5%;
    --btn-height: 2%;

    /* Mobile size boost ONLY */
    --mobile-size-scale: 1.4;
}

/* ========================= */

html, body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:black;
}

/* ===== BACKGROUND ===== */
.bg{
    position:fixed;
    inset:0;
    background:url("Images/2 comm facilit/ComFac.png") center/cover no-repeat;
    filter:blur(20px) brightness(0.7);
    transform:scale(1.1);
    z-index:0;
}

/* ===== SCROLLABLE STAGE ===== */
.stage{
    position:relative;
    z-index:1;
    width:100%;
    min-height:100vh; /* allows scrolling */
    display:flex;
    justify-content:center;
}

/* ===== IMAGE ===== */
.foreground{
    position:relative;
    width:100%;
    max-width:900px;
}

.foreground img{
    width:100%;
    height:auto;
    display:block;
}

/* ===== BACK BUTTON ===== */
.back-area{
    position:absolute;

    /* 🔥 SAME ON ALL DEVICES */
    top: var(--btn-top);
    left: var(--btn-left);

    width: var(--btn-width);
    height: var(--btn-height);

    z-index:99999;

    cursor:pointer;
    -webkit-tap-highlight-color: transparent;

    opacity: var(--show-button);

    /* Debug style (only visible when enabled) */
    background: rgba(255, 0, 0, 0.3);
    border: 2px solid red;
    color: white;

    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;
}

/* ===== MOBILE (ONLY SIZE CHANGES) ===== */
@media (max-width: 768px){
    .back-area{
        width: calc(var(--btn-width) * var(--mobile-size-scale));
        height: calc(var(--btn-height) * var(--mobile-size-scale));
    }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="stage">

    <div class="foreground">
        <img src="Images/2 comm facilit/ComFac.png" alt="Drawing">

        <div class="back-area" onclick="goBack()">BACK</div>
    </div>

</div>

<script>
function goBack(){
    if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
    } else {
        window.location.href = "ArkadianArt.html";
    }
}
</script>

</body>
</html>
