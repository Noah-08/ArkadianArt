<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interpretive Design</title>

<style>

/* =========================
   🎛️ CONTROL PANEL
   ========================= */
:root{
    --show-button: 1;

    /* ONE SYSTEM FOR ALL DEVICES ✅ */
    --btn-top: 11%;
    --btn-left: 22%;
    --btn-width: 5%;
    --btn-height: 2%;
}

/* ========================= */

html, body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:black;
}

/* ===== BACKGROUND ===== */
.bg{
    position:fixed;
    inset:0;
    background:url("Images/6 interp design/Interp.png") center/cover no-repeat;
    filter:blur(20px) brightness(1);
    transform:scale(1.1);
    z-index:0;
}

/* ===== STAGE ===== */
.stage{
    position:relative;
    z-index:1;
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center; /* keeps layout nice */
}

/* ===== IMAGE WRAPPER ===== */
.foreground{
    position:relative;
    width:100%;
    max-width:900px;
}

/* 🔥 CRITICAL: consistent scaling */
.foreground img{
    width:100%;
    height:auto;
    display:block;
}

/* ===== BACK BUTTON ===== */
.back-area{
    position:absolute;

    top: var(--btn-top);
    left: var(--btn-left);
    width: var(--btn-width);
    height: var(--btn-height);

    z-index:99999;

    cursor:pointer;
    -webkit-tap-highlight-color: transparent;

    opacity: var(--show-button);

    /* DEBUG */
    background: rgba(255, 0, 0, 0.3);
    border: 2px solid red;
    color: white;

    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;
}

/* ❌ REMOVE height-based mobile scaling */
@media (max-width: 768px){
    .foreground{
        width:100%;
    }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="stage">

    <div class="foreground">
        <img src="Images/6 interp design/Interp.png" alt="Interpretive Design">

        <div class="back-area" onclick="goBack()">BACK</div>
    </div>

</div>

<script>
function goBack(){
    if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
    } else {
        window.location.href = "ArkadianArt.html";
    }
}
</script>

</body>
</html>
