<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept Design</title>

<style>

/* =========================
   🎛️ CONTROL PANEL
   ========================= */
:root{
    --show-button: 1;

    /* DESKTOP position */
    --btn-top: 5%;
    --btn-left: 22%;

    /* SIZE */
    --btn-width: 5%;
    --btn-height: 2%;

    /* 📱 MOBILE POSITION */
    --mobile-left: 15%;
    --mobile-top: 2%;

    --mobile-size-scale: 1.4;

    /* 🔥 PREVIEW SETTINGS */
    --preview-scale: 0.5;
}

/* ========================= */

html, body{
    margin:0;
    padding:0;
    background:black;
    font-family:Arial, Helvetica, sans-serif;

    /* ✅ ALLOW SCROLL */
    min-height:100%;
    overflow-y:auto;
}

/* ===== BACKGROUND (fixed so it doesn't scroll weird) ===== */
.bg{
    position:fixed;
    inset:0;
    background:url("Images/3 concept design/ConceptDesign.png") center/cover no-repeat;
    filter:blur(20px) brightness(1);
    transform:scale(1.1);
    z-index:0;
}

/* ===== WRAPPER ===== */
.wrapper{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;

    position:relative;
    z-index:1;
}

/* ===== iPHONE PREVIEW MODE ===== */
.wrapper.mobile .stage{
    width:390px;
    height:auto;

    transform: scale(var(--preview-scale));
    transform-origin: top center;
}

/* ===== STAGE ===== */
.stage{
    position:relative;
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
}

/* ===== IMAGE ===== */
.foreground{
    position:relative;
    width:100%;
    max-width:900px;
}

.foreground img{
    width:100%;
    height:auto;
    display:block;
}

/* ===== BUTTON ===== */
.back-area{
    position:absolute;

    top: var(--btn-top);
    left: var(--btn-left);

    width: var(--btn-width);
    height: var(--btn-height);

    z-index:99999;
    cursor:pointer;

    opacity: var(--show-button);

    background: rgba(255, 0, 0, 0.3);
    border: 2px solid red;
    color: white;

    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;
}

/* ===== MOBILE MODE ===== */
.wrapper.mobile .back-area{
    top: var(--mobile-top);
    left: var(--mobile-left);

    width: calc(var(--btn-width) * var(--mobile-size-scale));
    height: calc(var(--btn-height) * var(--mobile-size-scale));
}

</style>
</head>

<body>

<div class="wrapper" id="wrapper">

    <div class="bg"></div>

    <div class="stage">
        <div class="foreground">
            <img src="Images/3 concept design/ConceptDesign.png" alt="Drawing">

            <div class="back-area" onclick="goBack()">BACK</div>
        </div>
    </div>

</div>

<script>
function goBack(){
    if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
    } else {
        window.location.href = "ArkadianArt.html";
    }
}

/* =========================
   🔥 TOGGLE HERE
   ========================= */
const ENABLE_IPHONE_PREVIEW = false;

const wrapper = document.getElementById("wrapper");

if(ENABLE_IPHONE_PREVIEW){
    wrapper.classList.add("mobile");
}else{
    wrapper.classList.remove("mobile");
}
</script>

</body>
</html>
