<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept Design</title>

<style>

/* =========================
   🎛️ CONTROL PANEL
   ========================= */
:root{
    --show-button: 1;

    /* =========================
       DESKTOP POSITION
    ========================= */
    --btn-top: 5%;
    --btn-left: 22%;
    --btn-width: 5%;
    --btn-height: 2%;

    /* =========================
       📱 MOBILE CONTROL
       ========================= */
    --mobile-mode: 0; /* 0 = desktop, 1 = mobile */

    --mobile-top: 18%;
    --mobile-left: -5%;
    --mobile-width: 8%;
    --mobile-height: 4%;
}

/* ========================= */

html, body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:black;
}

/* ===== BACKGROUND ===== */
.bg{
    position:fixed;
    inset:0;
    background:url("Images/3 concept design/ConceptDesign.png") center/cover no-repeat;
    filter:blur(20px) brightness(1);
    transform:scale(1.1);
    z-index:0;
}

/* ===== STAGE ===== */
.stage{
    position:relative;
    z-index:1;
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
}

/* ===== IMAGE WRAPPER ===== */
.foreground{
    position:relative;
    width:100%;
    max-width:900px;
}

/* IMAGE */
.foreground img{
    width:100%;
    height:auto;
    display:block;
}

/* ===== BACK BUTTON ===== */
.back-area{
    position:absolute;

    /* 🔥 MOBILE/DESKTOP SWITCH */
    top: calc(var(--btn-top) * (1 - var(--mobile-mode)) + var(--mobile-top) * var(--mobile-mode));
    left: calc(var(--btn-left) * (1 - var(--mobile-mode)) + var(--mobile-left) * var(--mobile-mode));
    width: calc(var(--btn-width) * (1 - var(--mobile-mode)) + var(--mobile-width) * var(--mobile-mode));
    height: calc(var(--btn-height) * (1 - var(--mobile-mode)) + var(--mobile-height) * var(--mobile-mode));

    z-index:99999;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;

    opacity: var(--show-button);

    /* DEBUG STYLE (remove when done) */
    background: rgba(255, 0, 0, 0.3);
    border: 2px solid red;

    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;
    color:white;
}

/* ===== MOBILE IMAGE BEHAVIOUR (optional but stable) ===== */
@media (max-width: 768px){

    .foreground{
        display:flex;
        justify-content:center;
    }

    .foreground img{
        height:100dvh;
        width:auto;
        max-width:none;
    }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="stage">

    <div class="foreground">
        <img src="Images/3 concept design/ConceptDesign.png" alt="Concept Design">

        <div class="back-area" onclick="goBack()">BACK</div>
    </div>

</div>

<script>
function goBack(){
    if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
    } else {
        window.location.href = "ArkadianArt.html";
    }
}
</script>

</body>
</html>
