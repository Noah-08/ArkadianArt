<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept Design</title>

<style>

/* =========================
   🎛️ CONTROL PANEL
   ========================= */
:root{
    --show-button: 1;

    /* DESKTOP position */
    --btn-top: 5%;
    --btn-left: 22%;

    /* SIZE */
    --btn-width: 5%;
    --btn-height: 2%;

    /* 📱 MOBILE TOGGLE */
    --use-mobile-position: 0;

    /* 📱 MOBILE POSITION (tweak these on iPhone) */
    --mobile-left: 2%;
    --mobile-top: 22%;

    --mobile-size-scale: 1.4;
}

/* ========================= */

html, body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:black;
}

/* ===== BACKGROUND ===== */
.bg{
    position:fixed;
    inset:0;
    background:url("Images/3 concept design/ConceptDesign.png") center/cover no-repeat;
    filter:blur(20px) brightness(1);
    transform:scale(1.1);
    z-index:0;
}

/* ===== STAGE ===== */
.stage{
    position:relative;
    z-index:1;
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
}

/* ===== IMAGE WRAPPER ===== */
.foreground{
    position:relative;
    width:100%;
    max-width:900px;
}

/* DESKTOP IMAGE */
.foreground img{
    width:100%;
    height:auto;
    display:block;
}

/* ===== BACK BUTTON ===== */
.back-area{
    position:absolute;

    top: var(--btn-top);
    left: var(--btn-left);

    width: var(--btn-width);
    height: var(--btn-height);

    z-index:99999;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;

    opacity: var(--show-button);

    /* DEBUG STYLE */
    background: rgba(255, 0, 0, 0.3);
    border: 2px solid red;
    color: white;

    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;
}

/* ===== MOBILE FIX ===== */
@media (max-width: 768px){

    .foreground{
        display:flex;
        justify-content:center;
    }

    .foreground img{
        height: 100dvh;
        width: auto;
        max-width: none;
    }

    .back-area{

        /* 🔥 Toggle between desktop & mobile positioning */
        top: calc(
            var(--btn-top) * (1 - var(--use-mobile-position)) +
            var(--mobile-top) * var(--use-mobile-position)
        );

        left: calc(
            var(--btn-left) * (1 - var(--use-mobile-position)) +
            var(--mobile-left) * var(--use-mobile-position)
        );

        width: calc(var(--btn-width) * var(--mobile-size-scale));
        height: calc(var(--btn-height) * var(--mobile-size-scale));
    }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="stage">

    <div class="foreground">
        <img src="Images/3 concept design/ConceptDesign.png" alt="Drawing">

        <div class="back-area" onclick="goBack()">BACK</div>
    </div>

</div>

<script>
function goBack(){
    if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
    } else {
        window.location.href = "ArkadianArt.html";
    }
}
</script>

</body>
</html>
