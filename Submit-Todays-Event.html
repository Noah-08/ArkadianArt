<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commissioning Today's Event</title>

<style>

/* =========================
   🎛️ CONTROL PANEL
   ========================= */
:root{
    --ui-opacity: 0; /* 🔥 1 = visible UI boxes, 0 = hidden UI boxes */

    --back-top: 8%;
    --back-left: 10%;
    --back-width: 34%;
    --back-height: 6%;

    --submit-top: 8%;
    --submit-left: 65%;
    --submit-width: 34%;
    --submit-height: 6%;

    --title-top: 27%;
    --title-left: 26%;
    --title-width: 47%;
    --title-height: 4%;

    --number-top: 32%;
    --number-left: 26%;
    --number-width: 47%;
    --number-height: 4%;

    --phone-top: 37%;
    --phone-left: 26%;
    --phone-width: 47%;
    --phone-height: 4%;

    --email-top: 42%;
    --email-left: 26%;
    --email-width: 47%;
    --email-height: 4%;

    --date-top: 47%;
    --date-left: 26%;
    --date-width: 47%;
    --date-height: 4%;

    --address-top: 52%;
    --address-left: 26%;
    --address-width: 47%;
    --address-height: 11%;

    --instructions-top: 68%;
    --instructions-left: 26%;
    --instructions-width: 47%;
    --instructions-height: 17%;
}

/* ========================= */

html, body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:white;
    overflow-x:hidden;
    overflow-y:auto;
    width:100%;
    height:auto;
}

/* ===== STAGE ===== */
.stage{
    position:relative;
    width:100%;
    display:flex;
    justify-content:center;
}

/* ===== FOREGROUND ===== */
.foreground{
    position:relative;
    width:100%;
    max-width:900px;
}

.foreground img{
    width:100%;
    height:auto;
    display:block;
}

/* =========================
   CLICK AREAS (BUTTONS)
   ========================= */
.click-area{
    position:absolute;
    z-index:99999;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;

    opacity: var(--ui-opacity);

    background: rgba(255, 0, 0, 0.30);
    border: 2px solid red;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:12px;
    font-weight:bold;
    color:white;
}

/* BACK BUTTON */
.back-area{
    top: var(--back-top);
    left: var(--back-left);
    width: var(--back-width);
    height: var(--back-height);
}

/* SUBMIT BUTTON */
.submit-button{
    position:absolute;
    z-index:99999;

    top: var(--submit-top);
    left: var(--submit-left);
    width: var(--submit-width);
    height: var(--submit-height);

    opacity: var(--ui-opacity);

    background: rgba(255, 0, 0, 0.30);
    border: 2px solid red;

    cursor:pointer;
    font-size:12px;
    font-weight:bold;
    color:white;
}

/* =========================
   INPUT BOXES
   ========================= */
.form-input{
    position:absolute;
    z-index:9999;

    /* 🔥 UI VISIBILITY CONTROL */
    background: rgba(255, 0, 0, calc(0.20 * var(--ui-opacity)));
    border: 2px solid rgba(255, 0, 0, var(--ui-opacity));

    outline:none;

    font-size:18px;
    color:#7c1a68;

    padding:10px;
    resize:none;
    box-sizing:border-box;
}

/* INPUT POSITIONS */
.title-artwork{ top:30%; left:26%; width:47%; height:2.5%; }
.number-artwork{ top:35%; left:26%; width:47%; height:2.5%; }
.phone{ top:40%; left:26%; width:47%; height:2.5%; }
.email{ top:45%; left:26%; width:47%; height:2.5%; }
.date{ top:50%; left:26%; width:47%; height:2.5%; }
.address{ top:55%; left:26%; width:47%; height:8%; }
.instructions{ top:65%; left:26%; width:47%; height:19%; }

/* =========================
   IMPORTANT: typed text stays visible
   ========================= */
input, textarea{
    color:#7c1a68;
    font-size:18px;
}

/* =========================
   MOBILE
   ========================= */
@media (max-width:768px){

    .form-input{
        font-size:13px;
        padding:6px;
    }

    input, textarea{
        font-size:13px;
    }
}

</style>
</head>

<body>

<div class="stage">
<div class="foreground">

<img src="Images/Commisions/today's event.png" alt="Commission Form">

<form action="https://formsubmit.co/arkadianart2@gmail.com" method="POST">

    <input type="hidden" name="_subject" value="New Today's Event Commission Submission">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_next" value="thank-you.html">

    <input class="form-input title-artwork" type="text" name="Title of Artwork" required>
    <input class="form-input number-artwork" type="text" name="Number of Artwork" required>
    <input class="form-input phone" type="text" name="Phone" required>
    <input class="form-input email" type="email" name="Email" required>
    <input class="form-input date" type="text" name="Date" required>

    <textarea class="form-input address" name="Postal Address" required></textarea>
    <textarea class="form-input instructions" name="Special Instructions" required></textarea>

    <button type="submit" class="submit-button">SUBMIT</button>

</form>

<div class="click-area back-area" onclick="goBack()">BACK</div>

</div>
</div>

<script>
function goBack(){
    if (document.referrer && document.referrer !== window.location.href){
        window.history.back();
    } else {
        window.location.href = "Todays-Events.html";
    }
}
</script>

</body>
</html>
