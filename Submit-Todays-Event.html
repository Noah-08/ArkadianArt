<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commissioning Today's Event</title>

<style>

/* =========================
   🎛️ CONTROL PANEL
   ========================= */
:root{
    --show-button: 1;
    --force-scroll: auto;

    --back-top: 8%;
    --back-left: 10%;
    --back-width: 34%;
    --back-height: 6%;

    --submit-top: 8%;
    --submit-left: 65%;
    --submit-width: 34%;
    --submit-height: 6%;

    --title-top: 27%;
    --title-left: 26%;
    --title-width: 47%;
    --title-height: 4%;

    --number-top: 32%;
    --number-left: 26%;
    --number-width: 47%;
    --number-height: 4%;

    --phone-top: 37%;
    --phone-left: 26%;
    --phone-width: 47%;
    --phone-height: 4%;

    --email-top: 42%;
    --email-left: 26%;
    --email-width: 47%;
    --email-height: 4%;

    --date-top: 47%;
    --date-left: 26%;
    --date-width: 47%;
    --date-height: 4%;

    --address-top: 52%;
    --address-left: 26%;
    --address-width: 47%;
    --address-height: 11%;

    --instructions-top: 68%;
    --instructions-left: 26%;
    --instructions-width: 47%;
    --instructions-height: 17%;
}

/* ========================= */

html, body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:black;

    /* 🔥 CRITICAL FIX */
    overflow-x:hidden;   /* NO sideways movement */
    overflow-y:auto;     /* only vertical scroll */
    height:auto;
    width:100%;
}

/* ===== BACKGROUND ===== */
.bg{
    position:fixed;
    inset:0;
    background:url("Images/Commisions/today's event.png") center/cover no-repeat;
    filter:blur(20px) brightness(1);
    transform:scale(1.1);
    z-index:0;
}

/* ===== STAGE ===== */
.stage{
    position:relative;
    z-index:1;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

/* ===== FOREGROUND ===== */
.foreground{
    position:relative;
    width:100%;
    max-width:900px;

    /* 🔥 IMPORTANT FIX: ensures correct page height calculation */
    display:block;
}

/* ===== IMAGE ===== */
.foreground img{
    width:100%;
    height:auto;
    display:block;
}

/* ===== CLICK AREAS ===== */
.click-area{
    position:absolute;
    z-index:99999;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;

    opacity: var(--show-button);

    background: rgba(255, 0, 0, 0.30);
    border: 2px solid red;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:12px;
    font-weight:bold;
    color:white;
}

/* BACK BUTTON */
.back-area{
    top: var(--back-top);
    left: var(--back-left);
    width: var(--back-width);
    height: var(--back-height);
}

/* SUBMIT BUTTON */
.submit-button{
    position:absolute;
    z-index:99999;

    top: var(--submit-top);
    left: var(--submit-left);
    width: var(--submit-width);
    height: var(--submit-height);

    background: rgba(255, 0, 0, 0.30);
    border: 2px solid red;

    cursor:pointer;
    font-size:12px;
    font-weight:bold;
    color:white;
}

/* ===== INPUTS ===== */
.form-input{
    position:absolute;
    z-index:9999;

    background: rgba(255, 0, 0, 0.20);
    border: 2px solid red;
    outline:none;

    font-size:18px;
    color:#7c1a68;

    padding:10px;
    resize:none;
    box-sizing:border-box;
}

/* POSITIONING (UNCHANGED) */
.title-artwork{ top:27%; left:26%; width:47%; height:4%; }
.number-artwork{ top:32%; left:26%; width:47%; height:4%; }
.phone{ top:37%; left:26%; width:47%; height:4%; }
.email{ top:42%; left:26%; width:47%; height:4%; }
.date{ top:47%; left:26%; width:47%; height:4%; }
.address{ top:52%; left:26%; width:47%; height:11%; }
.instructions{ top:68%; left:26%; width:47%; height:17%; }

textarea{
    font-family:Arial, Helvetica, sans-serif;
}

/* =========================
   📱 MOBILE FIX (SAFE ONLY)
   ========================= */
@media (max-width:768px){

    html, body{
        overflow-x:hidden; /* NO sideways scroll */
        overflow-y:auto;   /* ONLY vertical scroll */
        width:100%;
    }

    .foreground{
        width:100%;
        max-width:100%;
    }

    /* ONLY fix typing size (does NOT affect layout) */
    input,
    textarea{
        font-size:14px !important;
        line-height:1.2;
    }

    .form-input{
        padding:6px;
    }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="stage">
<div class="foreground">

<img src="Images/Commisions/today's event.png" alt="Commission Form">

<form action="https://formsubmit.co/noahallanphelps@gmail.com" method="POST">

    <input type="hidden" name="_subject" value="New Today's Event Commission Submission">
    <input type="hidden" name="_captcha" value="false">
    <input type="hidden" name="_template" value="table">
    <input type="hidden" name="_next" value="thank-you.html">

    <input class="form-input title-artwork" type="text" name="Title of Artwork" required>
    <input class="form-input number-artwork" type="text" name="Number of Artwork" required>
    <input class="form-input phone" type="text" name="Phone" required>
    <input class="form-input email" type="email" name="Email" required>
    <input class="form-input date" type="text" name="Date" required>

    <textarea class="form-input address" name="Postal Address" required></textarea>
    <textarea class="form-input instructions" name="Special Instructions" required></textarea>

    <button type="submit" class="submit-button">SUBMIT</button>

</form>

<div class="click-area back-area" onclick="goBack()">BACK</div>

</div>
</div>

<script>
const backHomePage = "Todays-Events.html";

function goBack(){
    if (document.referrer && document.referrer !== window.location.href){
        window.history.back();
    } else {
        window.location.href = backHomePage;
    }
}
</script>

</body>
</html>
