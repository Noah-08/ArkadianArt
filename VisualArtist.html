<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Artist</title>

<style>

html, body{
    margin:0;
    padding:0;
    overflow-x:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

/* ===== BACKGROUND ===== */
.bg-blur{
    position:fixed;
    inset:0;
    background-image:url("Images/1 visual artist/VisualArtLanding.jpg");
    background-size:cover;
    background-position:center;
    filter:blur(40px) brightness(1);
    transform:scale(1.2);
    z-index:-1;
}

/* ===== MAIN CONTAINER (FIXED SCALING SYSTEM) ===== */
.container{
    width:100%;
    display:flex;
    justify-content:center;
}

/* ===== RESPONSIVE DESIGN FRAME ===== */
.scale-wrapper{
    width: min(1000px, 100vw);  /* 🔥 key fix */
}

/* ===== IMAGE WRAPPER ===== */
.image-wrapper{
    position:relative;
    width:100%;
}

/* IMAGE */
.main-image{
    width:100%;
    display:block;
}

/* =========================
   POSITION SYSTEM (UNCHANGED LOGIC)
========================= */

:root{
    --left-col: 30%;
    --right-col: 30%;

    --row-1: 8%;
    --row-2: 13%;
    --row-3: 18%;
    --row-4: 23%;
    --row-5: 27%;
    --row-6: 32%;
    --row-7: 37%;
    --row-8: 41.5%;
    --row-9: 46%;
    --row-10: 52%;
    --row-11: 56%;
    --row-12: 61%;
    --row-13: 66%;
    --row-14: 71%;
    --row-15: 76%;
    --row-16: 80%;
    --row-17: 85%;
    --row-18: 90%;
    --row-19: 94%;

    --back-left: 18%;
    --back-top: 1%;
    --back-width: 6%;
    --back-height: 5%;
}

/* ===== HITBOXES ===== */
.hitbox{
    position:absolute;
    z-index:10;
    cursor:pointer;
    height:2.8%;
}

/* ===== BACK BUTTON (NOW PROPERLY SCALED) ===== */
.back-btn{
    position:absolute;

    top: var(--back-top);
    left: var(--back-left);
    width: var(--back-width);
    height: var(--back-height);

    z-index:999;

    /* hidden but active */
    background: transparent;
    border: none;
    opacity: 0;
}

/* ===== COLUMNS ===== */
.btn-left{
    left:var(--left-col);
    width:16%;
}

.btn-right{
    right:var(--right-col);
    width:16%;
}

/* ===== ROWS ===== */
.btn-1  { top:var(--row-1); }
.btn-2  { top:var(--row-1); }
.btn-3  { top:var(--row-2); }
.btn-4  { top:var(--row-2); }
.btn-5  { top:var(--row-3); }
.btn-6  { top:var(--row-3); }
.btn-7  { top:var(--row-4); }
.btn-8  { top:var(--row-4); }
.btn-9  { top:var(--row-5); }
.btn-10 { top:var(--row-5); }
.btn-11 { top:var(--row-6); }
.btn-12 { top:var(--row-6); }
.btn-13 { top:var(--row-7); }
.btn-14 { top:var(--row-7); }
.btn-15 { top:var(--row-8); }
.btn-16 { top:var(--row-8); }
.btn-17 { top:var(--row-9); }
.btn-18 { top:var(--row-9); }
.btn-19 { top:var(--row-10); }
.btn-20 { top:var(--row-10); }
.btn-21 { top:var(--row-11); }
.btn-22 { top:var(--row-11); }
.btn-23 { top:var(--row-12); }
.btn-24 { top:var(--row-12); }
.btn-25 { top:var(--row-13); }
.btn-26 { top:var(--row-13); }
.btn-27 { top:var(--row-14); }
.btn-28 { top:var(--row-14); }
.btn-29 { top:var(--row-15); }
.btn-30 { top:var(--row-15); }
.btn-31 { top:var(--row-16); }
.btn-32 { top:var(--row-16); }
.btn-33 { top:var(--row-17); }
.btn-34 { top:var(--row-17); }
.btn-35 { top:var(--row-18); }
.btn-36 { top:var(--row-18); }
.btn-37 { top:var(--row-19); }
.btn-38 { top:var(--row-19); }

</style>
</head>

<body>

<div class="bg-blur"></div>

<div class="container">

    <div class="scale-wrapper">

        <div class="image-wrapper">

            <img class="main-image" src="Images/1 visual artist/VisualArtLanding.jpg">

            <!-- BACK BUTTON -->
            <a class="back-btn" href="ArkadianArt.html"></a>

            <!-- LEFT -->
            <a class="hitbox btn-left btn-1" href="Drawing.html"></a>

            <!-- RIGHT -->
            <a class="hitbox btn-right btn-2" href="#"></a>

        </div>

    </div>

</div>

</body>
</html>
