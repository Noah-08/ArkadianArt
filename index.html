<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arkadian Art</title>

<style>

/* Reset */
html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}

/* Background blur */
.bg-blur{
    position:fixed;
    inset:0;
    background-image:url("Images/A LANDING CONT.../Landing.jpg");
    background-size:cover;
    background-position:center;
    filter:blur(40px) brightness(0.8);
    transform:scale(1.2);
    z-index:-1;
}

/* Container */
.container{
    position:relative;
    width:100%;
    height:100vh;
}

/* MAIN IMAGE (FULL HEIGHT, NO CROPPING) */
.main-image{
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);

    height:100vh;     /* 🔥 locks top & bottom */
    width:auto;       /* keeps aspect ratio */

    object-fit:contain;
    display:block;
}

/* =========================================================
   CONTINUE BUTTON (HIDDEN BUT ACTIVE)
========================================================= */

.continue-hitbox{
    position:absolute;

    top: 78%;
    left: 50%;
    transform:translate(-50%, -50%);

    width:clamp(60px, 6vw, 140px);
    height:clamp(60px, 6vw, 140px);

    cursor:pointer;
    z-index:5;

    background:transparent;
    border:none;
    opacity:0;

    -webkit-tap-highlight-color: transparent;
}

/* Mobile tweak */
@media (max-width: 768px){
    .continue-hitbox{
        width:clamp(70px, 10vw, 120px);
        height:clamp(70px, 10vw, 120px);
    }
}

</style>

</head>

<body>

<div class="bg-blur"></div>

<div class="container">

    <img class="main-image" src="Images/A LANDING CONT.../Landing.jpg" alt="Landing Page">

    <!-- CLICKABLE BUTTON -->
    <a href="ArkadianArt.html" class="continue-hitbox"></a>

</div>

</body>
</html>
