<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arkadian Art</title>

<style>

/* Reset */
html, body{
    margin:0;
    padding:0;
    height:100%;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
    background:black;
}

/* 🔥 FIX: prevents iPhone Safari UI jump issues */
html{
    height:-webkit-fill-available;
}

/* Background blur */
.bg-blur{
    position:fixed;
    inset:0;
    background-image:url("Images/A LANDING CONT.../Landing.jpg");
    background-size:cover;
    background-position:center;
    filter:blur(40px) brightness(1);
    transform:scale(1.2);
    z-index:-1;
}

/* Container */
.container{
    position:relative;
    width:100%;
    height:100vh;
    height:-webkit-fill-available; /* 🔥 iOS fix */
    display:flex;
    justify-content:center;
    align-items:center;
}

/* MAIN IMAGE (DESKTOP UNCHANGED) */
.main-image{
    position:absolute;
    top:0;
    left:50%;
    transform:translateX(-50%);

    height:100vh;
    width:auto;

    object-fit:contain;
    display:block;
}

/* =========================================================
   CONTINUE BUTTON
========================================================= */

.continue-hitbox{
    position:absolute;

    top: 78%;
    left: 50%;
    transform:translate(-50%, -50%);

    width:clamp(60px, 6vw, 140px);
    height:clamp(60px, 6vw, 140px);

    cursor:pointer;
    z-index:5;

    background:transparent;
    border:none;
    opacity:0;

    -webkit-tap-highlight-color: transparent;
}

/* =========================================================
   📱 iPhone IMPROVEMENT (app-like feel)
========================================================= */

@media (max-width: 768px){

    body{
        overflow:hidden;
        position:fixed;   /* 🔥 stops Safari address bar reflow */
        width:100%;
        height:100%;
    }

    .main-image{
        height:100vh;
        height:-webkit-fill-available;
    }
}

</style>

</head>

<body>

<div class="bg-blur"></div>

<div class="container">

    <img class="main-image" src="Images/A LANDING CONT.../Landing.jpg" alt="Landing Page">

    <a href="ArkadianArt.html" class="continue-hitbox"></a>

</div>

</body>
</html>
