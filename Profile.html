<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>

<style>

html, body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:black;
}

/* ===== BACKGROUND ===== */
.bg{
    position:fixed;
    inset:0;
    background:url("Images/13 profile/Profile.jpg") center/cover no-repeat;
    filter:blur(20px) brightness(0.7);
    transform:scale(1.1);
    z-index:0;
}

/* ===== SCROLLABLE STAGE ===== */
.stage{
    position:relative;
    z-index:1;
    width:100%;
    min-height:100vh;

    display:flex;
    justify-content:center;
}

/* ===== IMAGE WRAPPER ===== */
.foreground{
    position:relative;
    width:100%;
    max-width:900px;
}

/* FULL IMAGE */
.foreground img{
    width:100%;
    height:auto;
    display:block;
}

/* ===== BACK BUTTON (VISIBLE FOR ALIGNMENT) ===== */
.back-area{
    position:absolute;

    top: 3%;
    left: 22%;
    width: 5%;
    height: 2%;

    z-index:99999;

    /* DEBUG STYLE (visible) */
    background: rgba(255, 0, 0, 0.3);
    border: 2px solid red;
    color: white;

    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;

    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
}

/* ===== iPHONE TWEAK (MATCHED SCALE) ===== */
@media (max-width: 768px){
    .back-area{
        top: 3.8%;
        left: 21%;
        width: 6.5%;
        height: 3%;
    }
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="stage">

    <div class="foreground">
        <img src="Images/13 profile/Profile.jpg" alt="Drawing">

        <!-- BACK BUTTON -->
        <div class="back-area" onclick="goBack()">BACK</div>
    </div>

</div>

<script>
function goBack(){
    if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
    } else {
        window.location.href = "ArkadianArt.html";
    }
}
</script>

</body>
</html>
