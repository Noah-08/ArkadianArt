<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Photographic Videography</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:black;
    overflow:hidden;
}

/* =========================================================
   BLURRED BACKGROUND IMAGE
========================================================= */
.bg-blur{
    position:fixed;
    inset:0;
    background-image:url("Images/12 surf+art V's/VideoSlot.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    filter:blur(25px);
    transform:scale(1.2);
    z-index:-2;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.25);
    z-index:-1;
}

/* FRAME IMAGE */
.frame-image{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:100vw;
    height:100vh;
    object-fit:contain;
    z-index:0;
    pointer-events:none;
}

/* CENTER STAGE */
.stage{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1;
}

/* VIDEO WRAPPER */
.video-wrapper{
    position:relative;
    width:240px;
    transform:scale(min(1, 90vmin / 800));
    transform-origin:center;
}

video{
    width:100%;
    border-radius:10px;
    display:block;
    box-shadow:0 18px 50px rgba(0,0,0,0.6);
    cursor:pointer;
}

.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:38px;
    height:38px;
    cursor:pointer;
    z-index:5;
}

/* =========================================================
   BACK BUTTON (HIDDEN VISUALLY ONLY)
========================================================= */

.back-btn{
    position:fixed;

    left: 36vw;
    top: 4vh;

    width: clamp(200px, 2.2vw, 90px);
    height: clamp(99px, 2.2vw, 90px);

    z-index:99999;

    background: rgba(255, 0, 0, 0.4);
    border: 2px solid white;
    border-radius: 8px;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-size:12px;

    cursor:pointer;
    -webkit-tap-highlight-color: transparent;

    /* 🔥 hidden */
    opacity: 1;
}

/* =========================================================
   📱 iPHONE FIX (kept the same)
========================================================= */

@media (max-width: 768px){

    .back-btn{
        left: calc(12vw + env(safe-area-inset-left));
        top: calc(12vh + env(safe-area-inset-top));

        width: 200px;
        height: 56px;

        font-size: 12px;
    }

    body{
        overflow:hidden;
        position:fixed;
        width:100%;
        height:100%;
    }
}

</style>
</head>

<body>

<div class="bg-blur"></div>
<div class="overlay"></div>

<img class="frame-image" src="Images/12 surf+art V's/VideoSlot.jpg">

<!-- BACK BUTTON (hidden visually) -->
<div class="back-btn" onclick="goBack()">BACK</div>

<div class="stage">

    <div class="video-wrapper">

        <video 
            id="myVideo" 
            src="Images/12 surf+art V's/compilation - HD 720p.mov"
            playsinline
            webkit-playsinline
        ></video>

        <img src="Images/buttons/Play.png" class="play-btn" id="playBtn">

    </div>

</div>

<script>

const video = document.getElementById("myVideo");
const playBtn = document.getElementById("playBtn");

video.addEventListener("click", () => {
    video.pause();
});

playBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    video.play();
});

video.addEventListener("play", () => {
    playBtn.style.display = "none";
});

video.addEventListener("pause", () => {
    playBtn.style.display = "block";
});

video.addEventListener("loadeddata", () => {
    playBtn.style.display = "block";
});

function goBack(){
    if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
    } else {
        window.location.href = "ArkadianArt.html";
    }
}

document.addEventListener("touchstart", function(){}, true);

</script>

</body>
</html>
