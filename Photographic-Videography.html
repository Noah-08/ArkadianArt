<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Photographic Videography</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:black;
    overflow:hidden;
}

/* BACKGROUND */
.bg-blur{
    position:fixed;
    inset:0;
    background-image:url("Images/12 surf+art V's/VideoSlot.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    filter:blur(25px);
    transform:scale(1.2);
    z-index:-2;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.25);
    z-index:-1;
}

/* FRAME */
.frame-image{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:100vw;
    height:100vh;
    object-fit:contain;
    z-index:0;
    pointer-events:none;
}

/* CENTER STAGE */
.stage{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:1;
}

/* VIDEO WRAPPER */
.video-wrapper{
    position:relative;
    width:240px;
    transform:scale(min(1, 90vmin / 800));
    transform-origin:center;
    transition: all 0.6s ease;
}

/* EXPANDED */
.video-wrapper.expanded{
    position:fixed;
    top:50%;
    left:50%;
    width:100vw;
    height:100vh;
    transform:translate(-50%, -50%) scale(1);
    z-index:10;
}

/* VIDEO */
video{
    width:100%;
    height:auto;
    border-radius:10px;
    display:block;
    box-shadow:0 18px 50px rgba(0,0,0,0.6);
    cursor:pointer;
    transition: all 0.6s ease;
}

.video-wrapper.expanded video{
    width:100%;
    height:100%;
    object-fit:contain;
    border-radius:0;
}

/* PLAY BUTTON */
.play-btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:38px;
    height:38px;
    cursor:pointer;
    z-index:5;

    opacity:1;
    pointer-events:auto;

    transition: opacity 0.25s ease;
}

/* hidden state */
.play-btn.hidden{
    opacity:0;
    pointer-events:none;
}

/* BACK BUTTON */
.back-btn{
    position:fixed;
    left: 30vw;
    top: 4vh;
    width: clamp(200px, 2.2vw, 90px);
    height: clamp(99px, 2.2vw, 90px);
    z-index:99999;
    background: rgba(255, 0, 0, 0.4);
    border: 2px solid white;
    border-radius: 8px;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-size:12px;
    cursor:pointer;
    -webkit-tap-highlight-color: transparent;
    opacity: 0;
}

/* iPHONE FIX */
@media (max-width: 768px){
    .back-btn{
        left: calc(6vw + env(safe-area-inset-left));
        top: calc(12vh + env(safe-area-inset-top));
        width: 200px;
        height: 56px;
    }

    body{
        overflow:hidden;
        position:fixed;
        width:100%;
        height:100%;
    }
}

</style>
</head>

<body>

<div class="bg-blur"></div>
<div class="overlay"></div>

<img class="frame-image" src="Images/12 surf+art V's/VideoSlot.jpg">

<div class="back-btn" onclick="goBack()">BACK</div>

<div class="stage">

    <div class="video-wrapper" id="videoWrapper">

        <video 
            id="myVideo" 
            src="Images/New Images/videos/wwild west - 4K copy.mp4"
            playsinline
            webkit-playsinline
        ></video>

        <img src="Images/buttons/Play.png" class="play-btn" id="playBtn">

    </div>

</div>

<script>

const video = document.getElementById("myVideo");
const playBtn = document.getElementById("playBtn");
const wrapper = document.getElementById("videoWrapper");

/* FORCE UI CONTROL */
function showPlay(){
    playBtn.classList.remove("hidden");
}

function hidePlay(){
    playBtn.classList.add("hidden");
}

/* SHRINK VIDEO BACK DOWN */
function shrinkVideo(){
    wrapper.classList.remove("expanded");
    showPlay();
}

/* PLAY BUTTON */
playBtn.addEventListener("click", (e) => {
    e.stopPropagation();

    video.play();
    wrapper.classList.add("expanded");
    hidePlay();
});

/* VIDEO TOGGLE */
video.addEventListener("click", () => {

    if(video.paused){
        video.play();
        wrapper.classList.add("expanded");
        hidePlay();
    } else {
        video.pause();
        shrinkVideo();
    }

});

/* BACKUP EVENTS */
video.addEventListener("play", hidePlay);

video.addEventListener("pause", () => {
    if (!video.ended) {
        showPlay();
    }
});

/* 🔥 when video finishes, shrink back down */
video.addEventListener("ended", () => {
    shrinkVideo();
});

/* ensure visible initially */
video.addEventListener("loadeddata", showPlay);

/* BACK */
function goBack(){
    if (document.referrer && document.referrer !== window.location.href) {
        window.history.back();
    } else {
        window.location.href = "ArkadianArt.html";
    }
}

/* iOS touch fix */
document.addEventListener("touchstart", function(){}, true);

</script>

</body>
</html>
