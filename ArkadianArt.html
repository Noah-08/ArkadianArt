<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arkadian Art</title>

<style>

/* Reset */
html, body{
    margin:0;
    padding:0;
    overflow-x:hidden;
    overflow-y:auto;
    font-family:Arial, Helvetica, sans-serif;
}

/* Background blur */
.bg-blur{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background-image:url("Images/B landing 2column/MainPage.jpg");
    background-size:cover;
    background-position:center;
    filter:blur(40px) brightness(0.8);
    transform:scale(1.2);
    z-index:-1;
}

/* Container */
.container{
    width:100%;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

/* KEY FIX: responsive design frame */
.image-wrapper{
    position:relative;
    width:100%;
    max-width:900px;

    /* 🔥 forces stable scaling ratio reference */
    aspect-ratio: 900 / 1600;
}

/* Image */
.main-image{
    width:100%;
    height:auto;
    display:block;
}

/* HITBOX BASE FIX */
.hitbox{
    position:absolute;
    z-index:10;
    background:transparent;
    border:none;
    cursor:pointer;

    /* 🔥 iPhone touch safety */
    min-width:44px;
    min-height:44px;

    -webkit-tap-highlight-color: transparent;
}

/* ===== LAYOUT (now SAFE + RESPONSIVE) ===== */

/* Left column */
.btn-1  { top:17%; left:26%; width:18%; height:6%; }
.btn-3  { top:26%; left:26%; width:18%; height:6%; }
.btn-5  { top:35%; left:26%; width:18%; height:6%; }
.btn-7  { top:44%; left:26%; width:18%; height:6%; }
.btn-9  { top:53%; left:26%; width:18%; height:6%; }
.btn-11 { top:62%; left:26%; width:18%; height:6%; }
.btn-13 { top:71%; left:26%; width:18%; height:6%; }

/* Right column */
.btn-2  { top:17%; right:26%; width:18%; height:6%; }
.btn-4  { top:26%; right:26%; width:18%; height:6%; }
.btn-6  { top:35%; right:26%; width:18%; height:6%; }
.btn-8  { top:44%; right:26%; width:18%; height:6%; }
.btn-10 { top:53%; right:26%; width:18%; height:6%; }
.btn-12 { top:62%; right:26%; width:18%; height:6%; }
.btn-14 { top:71%; right:26%; width:18%; height:6%; }

/* Bottom center */
.btn-15{
    top:80%;
    left:50%;
    transform:translateX(-50%);
    width:20%;
    height:7%;
}

</style>

</head>

<body>

<div class="bg-blur"></div>

<div class="container">

    <div class="image-wrapper">

        <img class="main-image" src="Images/B landing 2column/MainPage.jpg" alt="Arkadian Art">

        <!-- Invisible clickable areas -->
        <a href="VisualArtist.html" class="hitbox btn-1"></a>
        <a href="community-facilitation.html" class="hitbox btn-2"></a>
        <a href="#" class="hitbox btn-3"></a>
        <a href="#" class="hitbox btn-4"></a>
        <a href="#" class="hitbox btn-5"></a>
        <a href="#" class="hitbox btn-6"></a>
        <a href="#" class="hitbox btn-7"></a>
        <a href="#" class="hitbox btn-8"></a>
        <a href="#" class="hitbox btn-9"></a>
        <a href="#" class="hitbox btn-10"></a>
        <a href="#" class="hitbox btn-11"></a>
        <a href="#" class="hitbox btn-12"></a>
        <a href="#" class="hitbox btn-13"></a>
        <a href="Photographic-Videography.html" class="hitbox btn-14"></a>
        <a href="Profile.html" class="hitbox btn-15"></a>

    </div>

</div>

</body>
</html>
